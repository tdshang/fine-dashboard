name: Refresh FINE Dashboard

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write build script
        run: |
          cat > build.js << 'JSEOF'
          // build.js — fetches ClickUp data and generates index.html
          const https = require('https');
          const fs = require('fs');

          const TOKEN = process.env.CLICKUP_TOKEN;
          const SPACE = process.env.SPACE_ID;
          const WORKSTREAM_FIELD = 'bde6b5f2-d0e0-4fe5-98d8-0ebf7d6c76b4';
          const RETREAT = new Date('2026-07-28');

          const KNOWN_FOLDERS = [
            '901318021853','901318021854',
            '901318021855','901318021857','901318021858'
          ];

          const TEAM_INFO = {
            'tshang@optimaed.com':    {name:'Tina Shang',      role:'DET',     initials:'TS'},
            'vjordan@optimaed.com':   {name:'Vince Jordan',    role:'CTO',     initials:'VJ'},
            'doverby@optimaed.com':   {name:'Dylan Overby',    role:'TL/PD',   initials:'DO'},
            'jstiles@optimaed.com':   {name:'Jay Stiles',      role:'AI/FSD',  initials:'JS'},
            'hmangrum@optimaed.com':  {name:'Heather Mangrum', role:'UD',      initials:'HM'},
            'rbezzina@optimaed.com':  {name:'Rachel Bezzina',  role:'Video',   initials:'RB'},
            'scozart@optimaed.com':   {name:'Sydney Carter',   role:'Asset',   initials:'SC'},
            'gwarren@optimaed.com':   {name:'Gabe Warren',     role:'Asset',   initials:'GW'},
            'jolson@optimaed.com':    {name:'Jonathan Olson',  role:'SME Lead',initials:'JO'},
            'rwalker@optimaed.com':   {name:'Ryan Walker',     role:'SME',     initials:'RW'},
            'sdevereaux@optimaed.com':{name:'Sarah Devereaux', role:'SME',     initials:'SD'},
            'jbergel@optimaed.com':   {name:'Jessica Bergel',  role:'SME',     initials:'JB'},
            'hduley@optimaed.com':    {name:'Heather Duley',   role:'SME',     initials:'HD'},
          };

          const TEAM_LIST = Object.entries(TEAM_INFO).map(([email,v]) => ({email,...v}));

          const WS_ORDER = ['ENGAGE Documentation','Asset Migration','Project Oversight',
            'Sprint 0 Audit',' Sprint 0 Audit','AI Avatars','Platform Integration',
            'K-12 Account Model','Forms System','Canvas LTI','COPPA/FERPA',
            'Education Environments','Experience & ILE','Web Companion',
            'Media Library','Analytics Layer','Training','QA & Deployment'];

          const WS_COLORS = {
            'ENGAGE Documentation':'#3e85c7','Asset Migration':'#D4A847',
            'Project Oversight':'#0091ff','Sprint 0 Audit':'#6647f0',
            ' Sprint 0 Audit':'#6647f0','AI Avatars':'#2ABCB0',
            'Platform Integration':'#FF4081','K-12 Account Model':'#8dcec3',
            'Forms System':'#7C4DFF','Canvas LTI':'#b6b6ff',
            'COPPA/FERPA':'#96c7f2','Education Environments':'#E09828',
            'Experience & ILE':'#ffaa7d','Web Companion':'#3e63dd',
            'Media Library':'#ab4aba','Analytics Layer':'#30a46c',
            'Training':'#27B97C','QA & Deployment':'#F0C96A'
          };

          const AV_COLORS = ['#3A9CE4','#27B97C','#D4A847','#DC4E4E','#8B70E6',
            '#2ABCB0','#F0A040','#E05C9A','#6647f0','#30a46c','#ab4aba','#3e63dd','#0091ff'];

          function avColor(initials) {
            let h = 0;
            for (const c of initials) h = (h * 31 + c.charCodeAt(0)) % AV_COLORS.length;
            return AV_COLORS[Math.abs(h) % AV_COLORS.length];
          }

          function get(path) {
            return new Promise((res, rej) => {
              const req = https.request(
                { hostname:'api.clickup.com', path:'/api/v2'+path,
                  headers:{ Authorization:TOKEN } },
                r => {
                  let d = '';
                  r.on('data', c => d += c);
                  r.on('end', () => {
                    try { res(JSON.parse(d)); }
                    catch(e) { rej(new Error('Parse: '+d.slice(0,100))); }
                  });
                }
              );
              req.on('error', rej);
              req.end();
            });
          }

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
          function pct(n,d) { return d ? Math.round(n/d*100) : 0; }
          function ss(t) { return (t.status && t.status.status ? t.status.status : '').toLowerCase().trim(); }
          function isDone(t) { const s = ss(t); return s === 'complete' || s === 'closed'; }

          function fmtDate(ts) {
            if (!ts) return '';
            return new Date(+ts).toLocaleDateString('en-US', {month:'short', day:'numeric'});
          }

          function pName(email) {
            const info = TEAM_INFO[email];
            return info ? info.name.split(' ')[0] : email.split('@')[0];
          }

          function pInitials(email) {
            return (TEAM_INFO[email] || {initials:'?'}).initials;
          }

          async function fetchAllTasks() {
            const allLists = [];
            for (const fid of KNOWN_FOLDERS) {
              try {
                const r = await get('/folder/'+fid+'/list?archived=false');
                (r.lists||[]).forEach(l => { l._folderId = fid; allLists.push(l); });
              } catch(e) { console.warn('folder '+fid+': '+e.message); }
            }
            try {
              const r = await get('/space/'+SPACE+'/list?archived=false');
              (r.lists||[]).forEach(l => allLists.push(l));
            } catch(e) {}

            console.log('Lists found: '+allLists.length);

            const tasks = [], seen = new Set();
            for (let i = 0; i < allLists.length; i++) {
              const l = allLists[i];
              console.log('List '+(i+1)+'/'+allLists.length+': '+l.name);
              let pg = 0;
              while (true) {
                try {
                  const r = await get('/list/'+l.id+'/task?page='+pg+'&include_closed=true&subtasks=true');
                  const batch = r.tasks || [];
                  batch.forEach(t => {
                    if (!seen.has(t.id)) {
                      seen.add(t.id);
                      t._lid = l.id;
                      t._folderId = l._folderId || null;
                      tasks.push(t);
                    }
                  });
                  if (batch.length < 100) break;
                  pg++;
                } catch(e) { console.warn('list '+l.id+': '+e.message); break; }
              }
              if (i > 0 && i % 10 === 0) await sleep(300);
            }
            return tasks;
          }

          async function enrichCustomFields(tasks) {
            const topLevel = tasks.filter(t => !t.parent);
            console.log('Enriching '+topLevel.length+' top-level tasks...');
            let done = 0;
            for (let i = 0; i < topLevel.length; i++) {
              const t = topLevel[i];
              try {
                const r = await get('/task/'+t.id+'?custom_fields=true');
                if (r.custom_fields) {
                  const ws = r.custom_fields.find(f => f.id === WORKSTREAM_FIELD);
                  if (ws && ws.value) {
                    t._workstream = ws.value.name || ws.value;
                  }
                }
                done++;
              } catch(e) {}
              if (i > 0 && i % 50 === 0) {
                console.log('Enriched '+done+'/'+topLevel.length);
                await sleep(600);
              }
            }
            // Propagate workstream to subtasks
            const taskMap = {};
            tasks.forEach(t => { taskMap[t.id] = t; });
            tasks.forEach(t => {
              if (t.parent && !t._workstream) {
                const p = taskMap[t.parent];
                if (p && p._workstream) t._workstream = p._workstream;
              }
            });
            console.log('Enrichment complete');
          }

          async function main() {
            console.log('Starting...');
            const tasks = await fetchAllTasks();
            console.log('Total tasks: '+tasks.length);
            await enrichCustomFields(tasks);

            const now = Date.now();
            const today = new Date(); today.setHours(0,0,0,0);
            const todayTs = today.getTime();
            const weekEnd = new Date(today); weekEnd.setDate(today.getDate()+7);
            const weekEndTs = weekEnd.getTime();
            const weekStart = new Date(today); weekStart.setDate(today.getDate()-7);
            const weekStartTs = weekStart.getTime();

            // Status counts
            let complete=0,inprogress=0,notstarted=0,atrisk=0,blocked=0,overdue=0;
            tasks.forEach(t => {
              const s = ss(t), d = isDone(t);
              const dt = +t.due_date||0;
              const tDt = new Date(dt); tDt.setHours(0,0,0,0);
              if (d) complete++;
              else if (s === 'in progress') inprogress++;
              else if (s === 'at risk') atrisk++;
              else if (s === 'blocked') blocked++;
              else notstarted++;
              if (!d && dt > 0 && tDt.getTime() < todayTs) overdue++;
            });
            const total = tasks.length;
            const completePct = pct(complete, total);
            const daysToRetreat = Math.ceil((RETREAT - now) / 86400000);

            // Workstreams
            const wsMap = {};
            tasks.forEach(t => {
              const ws = t._workstream || null;
              if (!ws) return;
              if (!wsMap[ws]) wsMap[ws] = {name:ws,complete:0,inprogress:0,notstarted:0,atrisk:0,blocked:0,total:0};
              const s = ss(t);
              wsMap[ws].total++;
              if (isDone(t)) wsMap[ws].complete++;
              else if (s === 'in progress') wsMap[ws].inprogress++;
              else if (s === 'at risk') wsMap[ws].atrisk++;
              else if (s === 'blocked') wsMap[ws].blocked++;
              else wsMap[ws].notstarted++;
            });

            const workstreams = Object.values(wsMap)
              .filter(w => w.total > 0)
              .sort((a, b) => {
                const ai = WS_ORDER.indexOf(a.name.trim());
                const bi = WS_ORDER.indexOf(b.name.trim());
                if (ai === -1 && bi === -1) return a.name.localeCompare(b.name);
                if (ai === -1) return 1;
                if (bi === -1) return -1;
                return ai - bi;
              });

            // Team stats
            const teamMap = {};
            tasks.forEach(t => {
              const d = isDone(t), s = ss(t);
              const dt = +t.due_date||0;
              const tDt = new Date(dt); tDt.setHours(0,0,0,0);
              const isOver = !d && dt > 0 && tDt.getTime() < todayTs;
              const isDueWeek = !d && dt > 0 && tDt.getTime() >= todayTs && tDt.getTime() <= weekEndTs;
              const upd = +t.date_updated||0;
              const closed = +t.date_closed||0;
              const workedOn = !d && upd >= weekStartTs;
              const completedThisWeek = d && closed >= weekStartTs;
              (t.assignees||[]).forEach(a => {
                const e = a.email||'';
                if (!teamMap[e]) teamMap[e] = {open:0,done:0,blocked:0,overdue:0,dueThisWeek:0,inprogress:0,workedOn:0,completedThisWeek:0};
                if (!d) teamMap[e].open++;
                if (d) teamMap[e].done++;
                if (s === 'blocked') teamMap[e].blocked++;
                if (s === 'in progress') teamMap[e].inprogress++;
                if (isOver) teamMap[e].overdue++;
                if (isDueWeek) teamMap[e].dueThisWeek++;
                if (workedOn) teamMap[e].workedOn++;
                if (completedThisWeek) teamMap[e].completedThisWeek++;
              });
            });

            const workedThisWeek = Object.entries(teamMap)
              .filter(([e,c]) => c.workedOn > 0)
              .sort((a,b) => b[1].workedOn - a[1].workedOn);

            const completedByPerson = Object.entries(teamMap)
              .filter(([e,c]) => c.completedThisWeek > 0)
              .sort((a,b) => b[1].completedThisWeek - a[1].completedThisWeek);

            const dueThisWeek = tasks
              .filter(t => {
                if (isDone(t)) return false;
                const dt = +t.due_date||0;
                if (!dt) return false;
                const tDt = new Date(dt); tDt.setHours(0,0,0,0);
                return tDt.getTime() <= weekEndTs;
              })
              .sort((a,b) => +a.due_date - +b.due_date)
              .slice(0, 30);

            const blockedTasks = tasks.filter(t => ss(t) === 'blocked').slice(0, 20);

            const milestones = tasks
              .filter(t => /^[\u{1F3C1}\u{1F680}\u{1F393}]/u.test(t.name))
              .sort((a,b) => (+a.due_date||0) - (+b.due_date||0));

            const todayActivity = tasks
              .filter(t => (+t.date_updated||0) >= todayTs)
              .sort((a,b) => (+b.date_updated) - (+a.date_updated))
              .slice(0, 10);

            const fetchedAt = new Date().toLocaleString('en-US', {
              timeZone:'America/Chicago',
              weekday:'long', month:'long', day:'numeric',
              hour:'2-digit', minute:'2-digit', timeZoneName:'short'
            });

            console.log('Rendering HTML...');
            const html = render({
              fetchedAt, daysToRetreat, completePct, total, complete,
              inprogress, notstarted, atrisk, blocked, overdue,
              workstreams, teamMap, workedThisWeek, completedByPerson,
              dueThisWeek, blockedTasks, milestones, todayActivity,
              todayTs
            });

            fs.writeFileSync('index.html', html);
            console.log('Done — index.html written');
          }

          function esc(str) {
            return String(str||'')
              .replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          }

          function numCell(v, color) {
            if (!v) return '<td class="tc tc-zero">—</td>';
            return '<td class="tc"><span style="color:'+color+'">'+v+'</span></td>';
          }

          function render(d) {
            const {fetchedAt,daysToRetreat,completePct,total,complete,inprogress,
                   notstarted,atrisk,blocked,overdue,workstreams,teamMap,
                   workedThisWeek,completedByPerson,dueThisWeek,blockedTasks,
                   milestones,todayActivity,todayTs} = d;

            const wsRows = workstreams.map(ws => {
              const cp = pct(ws.complete, ws.total);
              const ip = pct(ws.inprogress, ws.total);
              const bp = pct(ws.blocked, ws.total);
              const ap = pct(ws.atrisk, ws.total);
              const np = Math.max(0, 100-cp-ip-bp-ap);
              const color = WS_COLORS[ws.name.trim()] || '#5A7A9A';
              return '<div class="ws-row">'
                + '<div class="ws-name" title="'+esc(ws.name)+'">'+esc(ws.name)+'</div>'
                + '<div class="ws-bar-wrap">'
                + (ws.complete > 0 ? '<div class="ws-seg" style="width:'+cp+'%;background:#27B97C"></div>' : '')
                + (ws.inprogress > 0 ? '<div class="ws-seg" style="width:'+ip+'%;background:#3B9FE8"></div>' : '')
                + (ws.atrisk > 0 ? '<div class="ws-seg" style="width:'+ap+'%;background:#E09828"></div>' : '')
                + (ws.blocked > 0 ? '<div class="ws-seg" style="width:'+bp+'%;background:#E04E4E"></div>' : '')
                + (np > 0 ? '<div class="ws-seg" style="width:'+np+'%;background:rgba(255,255,255,0.06)"></div>' : '')
                + '</div>'
                + '<div class="ws-meta">'+ws.complete+'/'+ws.total+'</div>'
                + '<div class="ws-pct">'+cp+'%</div>'
                + '</div>';
            }).join('');

            const dueCards = dueThisWeek.map(t => {
              const dt = new Date(+t.due_date);
              const dtDay = new Date(dt); dtDay.setHours(0,0,0,0);
              const isOver = dtDay.getTime() < todayTs;
              const isToday = dtDay.getTime() === todayTs;
              const cls = isOver ? 'overdue' : isToday ? 'today' : '';
              const tag = isOver
                ? '<span class="due-tag dt-over">Overdue</span>'
                : isToday ? '<span class="due-tag dt-today">Today</span>'
                : '<span class="due-tag dt-soon">This week</span>';
              const who = (t.assignees||[]).map(a=>pName(a.email||'')).filter(Boolean).slice(0,2).join(', ');
              return '<div class="due-card '+cls+'">'
                + '<div class="due-date"><div class="due-day">'+dt.getDate()+'</div>'
                + '<div class="due-mon">'+dt.toLocaleDateString('en-US',{month:'short'})+'</div></div>'
                + '<div class="due-body">'
                + '<div class="due-name">'+esc(t.name)+'</div>'
                + '<div class="due-meta">'+(who?'<span class="due-who">'+esc(who)+'</span>':'')+tag+'</div>'
                + '</div></div>';
            }).join('');

            const blkRows = blockedTasks.length === 0
              ? '<div class="empty">No blocked tasks</div>'
              : blockedTasks.map(t => {
                  const who = (t.assignees||[]).map(a=>pName(a.email||'')).filter(Boolean).slice(0,2).join(', ');
                  return '<div class="blk-item">'
                    + '<div class="blk-dot"></div>'
                    + '<div><div class="blk-name">'+esc(t.name)+'</div>'
                    + (who ? '<div class="blk-who">'+esc(who)+'</div>' : '')
                    + '</div></div>';
                }).join('');

            const msRows = milestones.length === 0
              ? '<div class="empty">No milestones found</div>'
              : milestones.map(t => {
                  const d2 = isDone(t);
                  const dt = +t.due_date||0;
                  const tDt = new Date(dt); tDt.setHours(0,0,0,0);
                  const over = !d2 && dt > 0 && tDt.getTime() < todayTs;
                  const cls = d2 ? 'done' : over ? 'over' : '';
                  const icon = d2 ? '✓' : over ? '⚠' : '◇';
                  const badge = d2
                    ? '<span class="ms-badge mb-done">Done</span>'
                    : over ? '<span class="ms-badge mb-over">Overdue</span>'
                    : '<span class="ms-badge mb-up">Upcoming</span>';
                  return '<div class="ms-item '+cls+'">'
                    + '<div class="ms-icon">'+icon+'</div>'
                    + '<div class="ms-name'+(d2?' done':'')+'">'+esc(t.name)+'</div>'
                    + (dt ? '<div class="ms-date">'+fmtDate(dt)+'</div>' : '')
                    + badge+'</div>';
                }).join('');

            const actRows = todayActivity.length === 0
              ? '<div class="empty">No activity today</div>'
              : todayActivity.map(t => {
                  const s2 = ss(t), d2 = isDone(t);
                  const who = (t.assignees||[]).map(a=>pName(a.email||'')).filter(Boolean).slice(0,2).join(', ');
                  const cls = d2 ? 'closed' : s2==='in progress' ? 'progress' : '';
                  const badge = d2 ? '<span class="act-status as-closed">Closed</span>'
                    : s2==='in progress' ? '<span class="act-status as-prog">Active</span>' : '';
                  return '<div class="act-item '+cls+'">'
                    + '<div class="act-name">'+esc(t.name)+'</div>'
                    + '<div class="act-meta">'+(who?'<div class="act-who">'+esc(who)+'</div>':'')+badge+'</div>'
                    + '</div>';
                }).join('');

            const workedRows = workedThisWeek.slice(0,8).map(([email,c]) => {
              const ini = pInitials(email);
              const col = avColor(ini);
              return '<div class="p-row">'
                + '<div class="p-av" style="background:'+col+'20;color:'+col+'">'+ini+'</div>'
                + '<div class="p-name">'+esc(pName(email))+'</div>'
                + '<div class="p-count-sm">'+c.workedOn+' tasks</div>'
                + '</div>';
            }).join('') || '<div class="empty">No activity this week</div>';

            const completedRows = completedByPerson.slice(0,8).map(([email,c]) => {
              const ini = pInitials(email);
              const col = avColor(ini);
              return '<div class="p-row">'
                + '<div class="p-av" style="background:'+col+'20;color:'+col+'">'+ini+'</div>'
                + '<div class="p-name">'+esc(pName(email))+'</div>'
                + '<div class="p-count-green">'+c.completedThisWeek+'</div>'
                + '</div>';
            }).join('') || '<div class="empty">Nothing completed this week yet</div>';

            const teamRows = TEAM_LIST.map(m => {
              const c = teamMap[m.email] || {open:0,done:0,blocked:0,overdue:0,dueThisWeek:0,inprogress:0};
              const col = avColor(m.initials);
              let hcls='h-idle', htxt='Queued';
              const hasWork = c.open > 0 || c.done > 0;
              if (hasWork) {
                if (c.overdue >= 2 || c.blocked >= 2) { hcls='h-bad'; htxt='Needs attention'; }
                else if (c.overdue >= 1 || c.blocked >= 1) { hcls='h-warn'; htxt='Monitor'; }
                else if (c.inprogress > 0) { hcls='h-good'; htxt='Moving'; }
                else if (c.done > 0 && c.open === 0) { hcls='h-good'; htxt='Up to date'; }
              }
              return '<tr>'
                + '<td><div class="t-person">'
                + '<div class="t-av" style="background:'+col+'20;color:'+col+'">'+m.initials+'</div>'
                + '<div><div class="t-name">'+m.name+'</div><div class="t-role">'+m.role+'</div></div>'
                + '</div></td>'
                + '<td style="text-align:center"><span class="health '+hcls+'">'+htxt+'</span></td>'
                + numCell(c.overdue,'#E04E4E')
                + numCell(c.blocked,'#E09828')
                + numCell(c.dueThisWeek,'#EDE8DD')
                + numCell(c.inprogress,'#3B9FE8')
                + numCell(c.done,'#27B97C')
                + '</tr>';
            }).join('');

            return '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
              + '<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">\n'
              + '<title>Project F.I.N.E. Leadership Dashboard</title>\n'
              + '<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">\n'
              + '<style>\n'
              + buildCSS()
              + '</style>\n</head>\n<body>\n'
              + buildBody({
                  fetchedAt, daysToRetreat, completePct, total, complete,
                  inprogress, notstarted, atrisk, blocked, overdue,
                  wsRows, dueCards, blkRows, msRows, actRows,
                  workedRows, completedRows, teamRows,
                  wsCount: workstreams.length,
                  msCount: milestones.length,
                  blkCount: blockedTasks.length,
                  dueCount: dueThisWeek.length
                })
              + '\n</body>\n</html>';
          }

          function buildCSS() {
            return ':root{--bg:#0A0F14;--s1:#111820;--s2:#161E28;--border:rgba(255,255,255,0.06);'
              + '--gold:#C9A84C;--cream:#EDE8DD;--muted:rgba(237,232,221,0.4);'
              + '--green:#2DBD85;--blue:#3B9FE8;--amber:#E09828;--red:#E04E4E;--purple:#8B72E6;}\n'
              + '*{margin:0;padding:0;box-sizing:border-box;}\n'
              + 'body{font-family:Syne,sans-serif;background:var(--bg);color:var(--cream);'
              + 'background-image:radial-gradient(ellipse 80% 30% at 50% -5%,rgba(201,168,76,0.05),transparent);}\n'
              + '.header{border-bottom:1px solid var(--border);padding:0 32px;height:50px;'
              + 'display:flex;align-items:center;justify-content:space-between;'
              + 'background:rgba(10,15,20,0.9);backdrop-filter:blur(12px);'
              + 'position:sticky;top:0;z-index:100;}\n'
              + '.h-brand{font-family:"Instrument Serif",serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);}\n'
              + '.h-div{width:1px;height:14px;background:rgba(201,168,76,0.18);margin:0 12px;}\n'
              + '.h-title{font-size:12px;color:rgba(237,232,221,0.5);font-weight:500;}\n'
              + '.h-ts{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(237,232,221,0.25);}\n'
              + '.main{padding:22px 32px;max-width:1440px;margin:0 auto;}\n'
              + '.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}\n'
              + '.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}\n'
              + '.mb14{margin-bottom:14px;}\n'
              + '.panel{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}\n'
