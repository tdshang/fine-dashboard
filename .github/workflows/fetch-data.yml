              + 'text-align:center;gap:3px;min-width:150px;'
              + 'background-image:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.06),transparent 65%);}\n'
              + '.cd-e{font-size:20px;}\n'
              + '.cd-n{font-family:"Instrument Serif",serif;font-size:58px;color:var(--gold);line-height:1;}\n'
              + '.cd-u{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}\n'
              + '.cd-l{font-size:11px;color:var(--cream);font-weight:600;margin-top:2px;}\n'
              + '.cd-d{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);}\n'
              + '.prog-bg{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin:10px 0 8px;}\n'
              + '.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--green));}\n'
              + '.legend{display:flex;gap:14px;flex-wrap:wrap;}\n'
              + '.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}\n'
              + '.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0;}\n'
              + '.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}\n'
              + '.st{font-family:"Instrument Serif",serif;font-size:16px;color:var(--cream);}\n'
              + '.sb{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);'
              + 'background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.12);padding:3px 9px;border-radius:20px;}\n'
              + '.ws-chart{display:flex;flex-direction:column;gap:8px;}\n'
              + '.ws-row{display:flex;align-items:center;gap:10px;}\n'
              + '.ws-name{font-size:11px;font-weight:600;color:var(--cream);flex:0 0 155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n'
              + '.ws-bar-wrap{flex:1;height:20px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;}\n'
              + '.ws-seg{height:100%;float:left;}\n'
              + '.ws-meta{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);flex:0 0 42px;text-align:right;}\n'
              + '.ws-pct{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--gold);flex:0 0 30px;text-align:right;}\n'
              + '.ws-legend{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}\n'
              + '.team-table{width:100%;border-collapse:collapse;}\n'
              + '.team-table th{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 8px 10px;text-align:center;}\n'
              + '.team-table th:first-child{text-align:left;}\n'
              + '.team-table td{padding:8px;border-top:1px solid rgba(255,255,255,0.03);vertical-align:middle;}\n'
              + '.team-table tr:first-child td{border-top:none;}\n'
              + '.team-table tr:hover td{background:rgba(255,255,255,0.02);}\n'
              + '.t-person{display:flex;align-items:center;gap:8px;}\n'
              + '.t-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Instrument Serif",serif;font-size:10px;font-weight:600;flex-shrink:0;}\n'
              + '.t-name{font-size:12px;font-weight:600;color:var(--cream);}\n'
              + '.t-role{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);}\n'
              + '.tc{text-align:center;font-family:"Instrument Serif",serif;font-size:18px;}\n'
              + '.tc-zero{text-align:center;font-size:12px;color:rgba(237,232,221,0.15);}\n'
              + '.health{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;}\n'
              + '.h-good{background:rgba(45,189,133,0.12);color:var(--green);border:1px solid rgba(45,189,133,0.2);}\n'
              + '.h-warn{background:rgba(224,152,40,0.12);color:var(--amber);border:1px solid rgba(224,152,40,0.2);}\n'
              + '.h-bad{background:rgba(224,78,78,0.12);color:var(--red);border:1px solid rgba(224,78,78,0.2);}\n'
              + '.h-idle{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.07);}\n'
              + '.person-list{display:flex;flex-direction:column;gap:7px;}\n'
              + '.p-row{display:flex;align-items:center;gap:9px;padding:7px 10px;background:rgba(255,255,255,0.02);border-radius:7px;}\n'
              + '.p-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Instrument Serif",serif;font-size:10px;font-weight:600;flex-shrink:0;}\n'
              + '.p-name{flex:1;font-size:12px;font-weight:600;color:var(--cream);}\n'
              + '.p-count-sm{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);}\n'
              + '.p-count-green{font-family:"Instrument Serif",serif;font-size:20px;color:var(--green);}\n'
              + '.act-list{display:flex;flex-direction:column;gap:5px;}\n'
              + '.act-item{padding:8px 10px;background:rgba(255,255,255,0.02);border-radius:7px;border-left:2px solid var(--border);}\n'
              + '.act-item.closed{border-left-color:var(--green);}\n'
              + '.act-item.progress{border-left-color:var(--blue);}\n'
              + '.act-name{font-size:11px;font-weight:600;color:var(--cream);margin-bottom:2px;line-height:1.4;}\n'
              + '.act-meta{display:flex;align-items:center;gap:7px;}\n'
              + '.act-who{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);}\n'
              + '.act-status{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}\n'
              + '.as-closed{background:rgba(45,189,133,0.15);color:var(--green);}\n'
              + '.as-prog{background:rgba(59,159,232,0.15);color:var(--blue);}\n'
              + '.due-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:7px;}\n'
              + '.due-card{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;}\n'
              + '.due-card.overdue{background:rgba(224,78,78,0.05);border-color:rgba(224,78,78,0.15);}\n'
              + '.due-card.today{background:rgba(224,152,40,0.05);border-color:rgba(224,152,40,0.12);}\n'
              + '.due-date{flex-shrink:0;text-align:center;width:34px;}\n'
              + '.due-day{font-family:"Instrument Serif",serif;font-size:19px;color:var(--cream);line-height:1;}\n'
              + '.due-mon{font-family:"JetBrains Mono",monospace;font-size:8px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}\n'
              + '.due-card.overdue .due-day{color:var(--red);}\n'
              + '.due-card.today .due-day{color:var(--amber);}\n'
              + '.due-body{flex:1;min-width:0;}\n'
              + '.due-name{font-size:11px;font-weight:600;color:var(--cream);line-height:1.4;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n'
              + '.due-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}\n'
              + '.due-who{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);}\n'
              + '.due-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-family:"JetBrains Mono",monospace;font-weight:600;}\n'
              + '.dt-over{background:rgba(224,78,78,0.12);color:var(--red);}\n'
              + '.dt-today{background:rgba(224,152,40,0.12);color:var(--amber);}\n'
              + '.dt-soon{background:rgba(59,159,232,0.1);color:var(--blue);}\n'
              + '.blk-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:rgba(224,78,78,0.05);border:1px solid rgba(224,78,78,0.12);border-radius:7px;margin-bottom:7px;}\n'
              + '.blk-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px;}\n'
              + '.blk-name{font-size:12px;font-weight:600;color:var(--cream);line-height:1.4;}\n'
              + '.blk-who{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);}\n'
              + '.ms-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:7px;margin-bottom:7px;}\n'
              + '.ms-item.done{background:rgba(45,189,133,0.04);border-color:rgba(45,189,133,0.12);}\n'
              + '.ms-item.over{background:rgba(224,78,78,0.04);border-color:rgba(224,78,78,0.12);}\n'
              + '.ms-icon{font-size:11px;flex-shrink:0;}\n'
              + '.ms-name{flex:1;font-size:12px;font-weight:600;color:var(--cream);line-height:1.4;}\n'
              + '.ms-name.done{color:var(--muted);text-decoration:line-through;}\n'
              + '.ms-date{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);flex-shrink:0;}\n'
              + '.ms-badge{font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;flex-shrink:0;}\n'
              + '.mb-done{background:rgba(45,189,133,0.14);color:var(--green);}\n'
              + '.mb-up{background:rgba(201,168,76,0.1);color:var(--gold);}\n'
              + '.mb-over{background:rgba(224,78,78,0.14);color:var(--red);}\n'
              + '.empty{text-align:center;padding:22px;color:rgba(237,232,221,0.18);font-size:11px;}\n'
              + '.ov-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center;}\n'
              + '.ov-num{font-family:"Instrument Serif",serif;font-size:34px;line-height:1;}\n'
              + '.ov-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:3px;}\n';
          }

          function buildBody(d) {
            const {fetchedAt,daysToRetreat,completePct,total,complete,inprogress,
                   notstarted,atrisk,blocked,overdue,wsRows,dueCards,blkRows,
                   msRows,actRows,workedRows,completedRows,teamRows,
                   wsCount,msCount,blkCount,dueCount} = d;

            return '<div class="header">'
              + '<div style="display:flex;align-items:center">'
              + '<div class="h-brand">Optima ED</div><div class="h-div"></div>'
              + '<div class="h-title">Project F.I.N.E. &mdash; Leadership Dashboard</div>'
              + '</div>'
              + '<div class="h-ts">Data as of '+fetchedAt+'</div>'
              + '</div>\n'
              + '<div class="main">\n'

              // TOP ROW
              + '<div class="top-row">\n'
              + '<div class="top-left">'
              + '<div class="stat" style="--c:#27B97C"><div class="sn">'+complete+'</div><div class="sl">Complete</div></div>'
              + '<div class="stat" style="--c:#3B9FE8"><div class="sn">'+inprogress+'</div><div class="sl">In Progress</div></div>'
              + '<div class="stat" style="--c:#C9A84C"><div class="sn">'+total+'</div><div class="sl">Total Tasks</div></div>'
              + '</div>'
              + '<div class="countdown"><div class="cd-e">&#127891;</div>'
              + '<div class="cd-n">'+daysToRetreat+'</div>'
              + '<div class="cd-u">days to retreat</div>'
              + '<div class="cd-l">Teacher Training</div>'
              + '<div class="cd-d">July 28&ndash;31, 2026</div></div>'
              + '</div>\n'

              // PROGRESS + OVERVIEW
              + '<div class="g2 mb14">'
              + '<div class="panel"><div class="panel-title">Overall Progress Towards Completion</div>'
              + '<div class="prog-bg"><div class="prog-fill" style="width:'+completePct+'%"></div></div>'
              + '<div style="display:flex;justify-content:space-between;margin-bottom:10px;">'
              + '<span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--gold);">'+completePct+'% complete</span>'
              + '<span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--muted);">'+complete+' of '+total+' tasks</span>'
              + '</div>'
              + '<div class="legend">'
              + '<div class="li"><div class="ld" style="background:var(--green)"></div>'+complete+' closed</div>'
              + '<div class="li"><div class="ld" style="background:var(--blue)"></div>'+inprogress+' in progress</div>'
              + '<div class="li"><div class="ld" style="background:var(--amber)"></div>'+atrisk+' at risk</div>'
              + '<div class="li"><div class="ld" style="background:var(--red)"></div>'+blocked+' blocked</div>'
              + '<div class="li"><div class="ld" style="background:rgba(237,232,221,0.15)"></div>'+notstarted+' not started</div>'
              + '</div></div>'
              + '<div class="panel"><div class="panel-title">Key Metrics</div>'
              + '<div class="ov-grid">'
              + '<div><div class="ov-num" style="color:var(--red)">'+overdue+'</div><div class="ov-lbl">Overdue</div></div>'
              + '<div><div class="ov-num" style="color:var(--red)">'+blocked+'</div><div class="ov-lbl">Blocked</div></div>'
              + '<div><div class="ov-num" style="color:var(--blue)">'+dueCount+'</div><div class="ov-lbl">Due This Week</div></div>'
              + '</div></div>'
              + '</div>\n'

              // WORKSTREAMS
              + '<div class="panel mb14">'
              + '<div class="sh"><div class="st">Workstream Progress</div><div class="sb">'+wsCount+' active workstreams</div></div>'
              + '<div class="ws-chart">'+wsRows+'</div>'
              + '<div class="ws-legend">'
              + '<div class="li"><div class="ld" style="background:#27B97C"></div>Closed</div>'
              + '<div class="li"><div class="ld" style="background:#3B9FE8"></div>In Progress</div>'
              + '<div class="li"><div class="ld" style="background:#E09828"></div>At Risk</div>'
              + '<div class="li"><div class="ld" style="background:#E04E4E"></div>Blocked</div>'
              + '<div class="li"><div class="ld" style="background:rgba(255,255,255,0.15)"></div>Not Started</div>'
              + '</div></div>\n'

              // WORKED / COMPLETED / ACTIVITY
              + '<div class="g3">'
              + '<div class="panel"><div class="panel-title">Worked On This Week</div>'
              + '<div class="person-list">'+workedRows+'</div></div>'
              + '<div class="panel"><div class="panel-title">Completed This Week</div>'
              + '<div class="person-list">'+completedRows+'</div></div>'
              + '<div class="panel"><div class="panel-title">Latest Activity</div>'
              + '<div class="act-list">'+actRows+'</div></div>'
              + '</div>\n'

              // BLOCKED + MILESTONES
              + '<div class="g2">'
              + '<div class="panel"><div class="sh"><div class="st">Blocked Tasks</div><div class="sb">'+blkCount+' blocked</div></div>'+blkRows+'</div>'
              + '<div class="panel"><div class="sh"><div class="st">Milestones &amp; Gates</div><div class="sb">'+msCount+' gates</div></div>'+msRows+'</div>'
              + '</div>\n'

              // DUE THIS WEEK
              + '<div class="panel mb14">'
              + '<div class="sh"><div class="st">Tasks Due This Week</div><div class="sb">'+dueCount+' tasks</div></div>'
              + '<div class="due-grid">'+dueCards+'</div>'
              + '</div>\n'

              // TEAM HEALTH
              + '<div class="panel mb14">'
              + '<div class="sh"><div class="st">Team Health</div><div class="sb">13 Members</div></div>'
              + '<table class="team-table"><thead><tr>'
              + '<th>Team Member</th><th>Health</th><th>Overdue</th><th>Blocked</th>'
              + '<th>Due This Week</th><th>In Progress</th><th>Complete</th>'
              + '</tr></thead><tbody>'+teamRows+'</tbody></table>'
              + '</div>\n'

              + '</div>';
          }

          main().catch(e => { console.error('FAILED:', e.message); process.exit(1); });
          JSEOF

      - name: Run build script
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          SPACE_ID: '901313746539'
        run: node build.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
