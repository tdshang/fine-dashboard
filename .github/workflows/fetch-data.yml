name: Refresh FINE Dashboard

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Write build script
        run: |
          cat > build.js << 'JSEOF'
          const https = require('https');
          const fs = require('fs');

          const TOKEN = process.env.CLICKUP_TOKEN;
          const SPACE = process.env.SPACE_ID;
          const WORKSTREAM_FIELD = 'bde6b5f2-d0e0-4fe5-98d8-0ebf7d6c76b4';
          const RETREAT = new Date('2026-07-19');

          const KNOWN_FOLDERS = ['901318021853','901318021854','901318021855','901318021857','901318021858'];

          const TEAM_INFO = {
            'tshang@optimaed.com':    {name:'Tina Shang',      role:'DET',     initials:'TS'},
            'vjordan@optimaed.com':   {name:'Vince Jordan',    role:'CTO',     initials:'VJ'},
            'doverby@optimaed.com':   {name:'Dylan Overby',    role:'TL/PD',   initials:'DO'},
            'jstiles@optimaed.com':   {name:'Jay Stiles',      role:'AI/FSD',  initials:'JS'},
            'hmangrum@optimaed.com':  {name:'Heather Mangrum', role:'UD',      initials:'HM'},
            'rbezzina@optimaed.com':  {name:'Rachel Bezzina',  role:'Video',   initials:'RB'},
            'scozart@optimaed.com':   {name:'Sydney Carter',   role:'Asset',   initials:'SC'},
            'gwarren@optimaed.com':   {name:'Gabe Warren',     role:'Asset',   initials:'GW'},
            'jolson@optimaed.com':    {name:'Jonathan Olson',  role:'SME Lead',initials:'JO'},
            'rwalker@optimaed.com':   {name:'Ryan Walker',     role:'SME',     initials:'RW'},
            'sdevereaux@optimaed.com':{name:'Sarah Devereaux', role:'SME',     initials:'SD'},
            'jbergel@optimaed.com':   {name:'Jessica Bergel',  role:'SME',     initials:'JB'},
            'hduley@optimaed.com':    {name:'Heather Duley',   role:'SME',     initials:'HD'},
          };

          const TEAM_LIST = Object.entries(TEAM_INFO).map(([email,v]) => ({email,...v}));

          const WS_ORDER = ['ENGAGE Documentation','Asset Migration','Project Oversight',
            'Sprint 0 Audit',' Sprint 0 Audit','AI Avatars','Platform Integration',
            'K-12 Account Model','Forms System','Canvas LTI','COPPA/FERPA',
            'Education Environments','Experience & ILE','Web Companion',
            'Media Library','Analytics Layer','Training','QA & Deployment'];

          const COLORS = {
            notStarted:'#4a4a6a', inProgress:'#7c6fcd', done:'#6bc97e',
            atRisk:'#f0a030', blocked:'#e05050', closed:'#6bc97e'
          };

          const AV_COLORS = ['#7c6fcd','#6bc97e','#f0a030','#e05050','#3B9FE8','#2ABCB0','#E05C9A','#ab4aba','#3e63dd','#D4A847'];

          function avColor(str) {
            let h = 0;
            for (const c of (str||'')) h = (h*31 + c.charCodeAt(0)) % AV_COLORS.length;
            return AV_COLORS[Math.abs(h) % AV_COLORS.length];
          }

          function get(path) {
            return new Promise((res, rej) => {
              const req = https.request(
                {hostname:'api.clickup.com', path:'/api/v2'+path, headers:{Authorization:TOKEN}},
                r => { let d=''; r.on('data',c=>d+=c); r.on('end',()=>{ try{res(JSON.parse(d));}catch(e){rej(new Error('Parse:'+d.slice(0,80)));} }); }
              );
              req.on('error',rej); req.end();
            });
          }

          function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
          function pct(n,d){return d?Math.round(n/d*100):0;}
          function ss(t){return(t.status&&t.status.status?t.status.status:'').toLowerCase().trim();}
          function isDone(t){const s=ss(t);return s==='complete'||s==='closed';}
          function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
          function fmtDate(ts){if(!ts)return'';return new Date(+ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
          function pName(e){return(TEAM_INFO[e]||{name:e.split('@')[0]}).name.split(' ')[0];}
          function pFull(e){return(TEAM_INFO[e]||{name:e.split('@')[0]}).name;}
          function pIni(e){return(TEAM_INFO[e]||{initials:'?'}).initials;}

          async function fetchAllTasks() {
            const allLists=[];
            const seenFolders=new Set();
            // Fetch ALL folders in the space dynamically
            try{
              const fr=await get('/space/'+SPACE+'/folder?archived=false');
              const folders=fr.folders||[];
              console.log('Folders found:'+folders.length);
              for(const f of folders){
                seenFolders.add(f.id);
                try{const r=await get('/folder/'+f.id+'/list?archived=false');(r.lists||[]).forEach(l=>{l._folderId=f.id;allLists.push(l);});}catch(e){console.warn('folder '+f.id+':'+e.message);}
              }
            }catch(e){console.warn('space folders:'+e.message);}
            // Fallback: hardcoded folders in case any missed
            for(const fid of KNOWN_FOLDERS){
              if(seenFolders.has(fid))continue;
              try{const r=await get('/folder/'+fid+'/list?archived=false');(r.lists||[]).forEach(l=>{l._folderId=fid;allLists.push(l);});}catch(e){console.warn('folder '+fid+':'+e.message);}
            }
            // Folderless lists at space level
            try{const r=await get('/space/'+SPACE+'/list?archived=false');(r.lists||[]).forEach(l=>allLists.push(l));}catch(e){}
            console.log('Lists:'+allLists.length);
            const tasks=[],seen=new Set();
            for(let i=0;i<allLists.length;i++){
              const l=allLists[i];
              console.log('List '+(i+1)+'/'+allLists.length+':'+l.name);
              let pg=0;
              while(true){
                try{
                  const r=await get('/list/'+l.id+'/task?page='+pg+'&include_closed=true&subtasks=true');
                  const batch=r.tasks||[];
                  batch.forEach(t=>{if(!seen.has(t.id)){seen.add(t.id);t._lid=l.id;t._folderId=l._folderId||null;tasks.push(t);}});
                  if(batch.length<100)break;pg++;
                }catch(e){console.warn('list '+l.id+':'+e.message);break;}
              }
              if(i>0&&i%10===0)await sleep(300);
            }
            return tasks;
          }

          async function enrichCustomFields(tasks) {
            const top=tasks.filter(t=>!t.parent);
            console.log('Enriching '+top.length+' tasks...');
            let done=0;
            for(let i=0;i<top.length;i++){
              const t=top[i];
              try{
                const r=await get('/task/'+t.id+'?custom_fields=true');
                if(r.custom_fields){
                  const ws=r.custom_fields.find(f=>f.id===WORKSTREAM_FIELD);
                  if(ws&&ws.value)t._workstream=ws.value.name||ws.value;
                }
                done++;
              }catch(e){}
              if(i>0&&i%50===0){console.log('Enriched '+done+'/'+top.length);await sleep(600);}
            }
            const taskMap={};tasks.forEach(t=>{taskMap[t.id]=t;});
            tasks.forEach(t=>{if(t.parent&&!t._workstream){const p=taskMap[t.parent];if(p&&p._workstream)t._workstream=p._workstream;}});
            console.log('Enrichment done');
          }

          async function main() {
            console.log('Starting...');
            const tasks=await fetchAllTasks();
            console.log('Total:'+tasks.length);
            await enrichCustomFields(tasks);

            const now=Date.now();
            const today=new Date();today.setHours(0,0,0,0);
            const todayTs=today.getTime();
            const weekEnd=new Date(today);weekEnd.setDate(today.getDate()+7);
            const weekEndTs=weekEnd.getTime();
            const weekStart=new Date(today);weekStart.setDate(today.getDate()-7);
            const weekStartTs=weekStart.getTime();
            const month30Start=new Date(today);month30Start.setDate(today.getDate()-30);
            const month30Ts=month30Start.getTime();

            let complete=0,inprogress=0,notstarted=0,atrisk=0,blocked=0,overdue=0;
            tasks.forEach(t=>{
              const s=ss(t),d=isDone(t);
              const dt=+t.due_date||0;
              const tDt=new Date(dt);tDt.setHours(0,0,0,0);
              if(d)complete++;
              else if(s==='in progress')inprogress++;
              else if(s==='at risk')atrisk++;
              else if(s==='blocked')blocked++;
              else notstarted++;
              if(!d&&dt>0&&tDt.getTime()<todayTs)overdue++;
            });
            const total=tasks.length;
            const completePct=pct(complete,total);
            const daysToRetreat=Math.ceil((RETREAT-now)/86400000);

            const wsMap={};
            tasks.forEach(t=>{
              const ws=t._workstream&&typeof t._workstream==='string'?t._workstream.trim():null;
              if(!ws)return;
              if(!wsMap[ws])wsMap[ws]={name:ws,complete:0,inprogress:0,notstarted:0,atrisk:0,blocked:0,total:0};
              const s=ss(t);
              wsMap[ws].total++;
              if(isDone(t))wsMap[ws].complete++;
              else if(s==='in progress')wsMap[ws].inprogress++;
              else if(s==='at risk')wsMap[ws].atrisk++;
              else if(s==='blocked')wsMap[ws].blocked++;
              else wsMap[ws].notstarted++;
            });

            const workstreams=Object.values(wsMap).filter(w=>w.total>0).sort((a,b)=>{
              const ai=WS_ORDER.indexOf((a.name||'').trim()),bi=WS_ORDER.indexOf((b.name||'').trim());
              if(ai===-1&&bi===-1)return a.name.localeCompare(b.name);
              if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi;
            });

            const teamMap={};
            tasks.forEach(t=>{
              const d=isDone(t),s=ss(t);
              const dt=+t.due_date||0;
              const tDt=new Date(dt);tDt.setHours(0,0,0,0);
              const isOver=!d&&dt>0&&tDt.getTime()<todayTs;
              const isDueWeek=!d&&dt>0&&tDt.getTime()>=todayTs&&tDt.getTime()<=weekEndTs;
              const upd=+t.date_updated||0;
              const closed=+t.date_closed||0;
              const workedOn=upd>=weekStartTs;  // match ClickUp: all tasks touched this week
              const completedThisWeek=d&&closed>=weekStartTs;
              const completedMonth=d&&closed>=month30Ts;
              (t.assignees||[]).forEach(a=>{
                const e=a.email||'';
                if(!teamMap[e])teamMap[e]={open:0,done:0,blocked:0,overdue:0,dueThisWeek:0,inprogress:0,workedOn:0,completedThisWeek:0,completedMonth:0,workedOnTasks:0};
                if(!d)teamMap[e].open++;
                if(d)teamMap[e].done++;
                if(s==='blocked')teamMap[e].blocked++;
                if(s==='in progress')teamMap[e].inprogress++;
                if(isOver)teamMap[e].overdue++;
                if(isDueWeek)teamMap[e].dueThisWeek++;
                if(workedOn)teamMap[e].workedOn++;
                if(completedThisWeek)teamMap[e].completedThisWeek++;
                if(completedMonth)teamMap[e].completedMonth++;
                if(upd>=weekStartTs)teamMap[e].workedOnTasks++;
              });
            });

            const workedThisWeek=Object.entries(teamMap).filter(([e,c])=>c.workedOnTasks>0).sort((a,b)=>b[1].workedOnTasks-a[1].workedOnTasks);
            const completedByPerson=Object.entries(teamMap).filter(([e,c])=>c.completedThisWeek>0).sort((a,b)=>b[1].completedThisWeek-a[1].completedThisWeek);
            const openByPerson=Object.entries(teamMap).filter(([e,c])=>c.open>0).sort((a,b)=>b[1].open-a[1].open);

            const dueThisWeek=tasks.filter(t=>{
              if(isDone(t))return false;
              const dt=+t.due_date||0;if(!dt)return false;
              const tDt=new Date(dt);tDt.setHours(0,0,0,0);
              return tDt.getTime()<=weekEndTs;
            }).sort((a,b)=>+a.due_date-+b.due_date).slice(0,30);

            const blockedTasks=tasks.filter(t=>ss(t)==='blocked').slice(0,20);
            const milestones=tasks.filter(t=>/^[\u{1F3C1}\u{1F680}\u{1F393}]/u.test(t.name)).sort((a,b)=>(+a.due_date||0)-(+b.due_date||0));
            const yesterdayTs=todayTs-86400000;
            const todayActivity=tasks.filter(t=>(+t.date_updated||0)>=todayTs).sort((a,b)=>(+b.date_updated)-(+a.date_updated)).slice(0,15);
            const yesterdayActivity=tasks.filter(t=>{const u=+t.date_updated||0;return u>=yesterdayTs&&u<todayTs;}).sort((a,b)=>(+b.date_updated)-(+a.date_updated)).slice(0,15);
            // Tasks completed today
            const completedToday=tasks.filter(t=>isDone(t)&&(+t.date_closed||0)>=todayTs).sort((a,b)=>(+b.date_closed)-(+a.date_closed)).slice(0,20);

            const fetchedAt=new Date().toLocaleString('en-US',{timeZone:'America/Chicago',weekday:'long',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',timeZoneName:'short'});

            console.log('Rendering...');
            const html=buildHTML({fetchedAt,daysToRetreat,completePct,total,complete,inprogress,notstarted,atrisk,blocked,overdue,workstreams,teamMap,workedThisWeek,completedByPerson,openByPerson,dueThisWeek,blockedTasks,milestones,todayActivity,yesterdayActivity,completedToday,todayTs,weekStartTs});

            fs.writeFileSync('index.html',html);
            console.log('Done');
          }

          function buildPieChart(segments, cx, cy, r) {
            if(!segments||segments.length===0)return'';
            const total=segments.reduce((s,sg)=>s+sg.value,0);
            if(total===0)return'';
            let angle=-Math.PI/2;
            const paths=[];
            segments.forEach(sg=>{
              const sweep=2*Math.PI*(sg.value/total);
              const x1=cx+r*Math.cos(angle);
              const y1=cy+r*Math.sin(angle);
              const x2=cx+r*Math.cos(angle+sweep);
              const y2=cy+r*Math.sin(angle+sweep);
              const large=sweep>Math.PI?1:0;
              paths.push('<path d="M '+cx+' '+cy+' L '+x1.toFixed(1)+' '+y1.toFixed(1)+' A '+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+' Z" fill="'+sg.color+'"/>');
              angle+=sweep;
            });
            return paths.join('');
          }

          function buildDonutChart(segments, cx, cy, r, innerR) {
            if(!segments||segments.length===0)return'';
            const total=segments.reduce((s,sg)=>s+sg.value,0);
            if(total===0)return'';
            let angle=-Math.PI/2;
            const paths=[];
            segments.forEach(sg=>{
              const sweep=2*Math.PI*(sg.value/total);
              const x1o=cx+r*Math.cos(angle),y1o=cy+r*Math.sin(angle);
              const x2o=cx+r*Math.cos(angle+sweep),y2o=cy+r*Math.sin(angle+sweep);
              const x1i=cx+innerR*Math.cos(angle+sweep),y1i=cy+innerR*Math.sin(angle+sweep);
              const x2i=cx+innerR*Math.cos(angle),y2i=cy+innerR*Math.sin(angle);
              const large=sweep>Math.PI?1:0;
              paths.push('<path d="M '+x1o.toFixed(1)+' '+y1o.toFixed(1)+' A '+r+' '+r+' 0 '+large+' 1 '+x2o.toFixed(1)+' '+y2o.toFixed(1)+' L '+x1i.toFixed(1)+' '+y1i.toFixed(1)+' A '+innerR+' '+innerR+' 0 '+large+' 0 '+x2i.toFixed(1)+' '+y2i.toFixed(1)+' Z" fill="'+sg.color+'"/>');
              angle+=sweep;
            });
            return paths.join('');
          }

          function buildHTML(d) {
            const {fetchedAt,daysToRetreat,completePct,total,complete,inprogress,notstarted,atrisk,blocked,overdue,workstreams,teamMap,workedThisWeek,completedByPerson,openByPerson,dueThisWeek,blockedTasks,milestones,todayActivity,yesterdayActivity,completedToday,todayTs,weekStartTs}=d;

            // Workload by status donut
            const statusSegs=[
              {label:'Not Started',value:notstarted,color:'#87878f'},
              {label:'In Progress',value:inprogress,color:'#7c6fcd'},
              {label:'At Risk',value:atrisk,color:'#f0a030'},
              {label:'Blocked',value:blocked,color:'#e05050'},
              {label:'Closed',value:complete,color:'#6bc97e'},
            ].filter(s=>s.value>0);

            const donutSVG='<svg width="180" height="180" viewBox="0 0 180 180">'
              +buildDonutChart(statusSegs,90,90,80,45)
              +'<text x="90" y="86" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold" font-family="sans-serif">'+completePct+'%</text>'
              +'<text x="90" y="104" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">complete</text>'
              +'</svg>';

            // Priority breakdown bar chart
            const priorityCounts={urgent:0,high:0,normal:0,low:0,none:0};
            // tasks is not in scope here but we compute from counts passed
            // We'll use a simple bar based on status instead for now

            // Open tasks by person - pie
            const personSegs=openByPerson.slice(0,8).map(([e,c])=>({label:pName(e),value:c.open,color:avColor(pIni(e))}));
            const personPieSVG='<svg width="200" height="200" viewBox="0 0 200 200">'
              +buildPieChart(personSegs,100,100,95)
              +'</svg>';

            // Progress bar segments
            const progW=completePct;
            const ipW=pct(inprogress,total);
            const atW=pct(atrisk,total);
            const blW=pct(blocked,total);
            const nsW=Math.max(0,100-progW-ipW-atW-blW);

            // Workstream rows
            const wsRowsHTML=workstreams.map(ws=>{
              const cp=pct(ws.complete,ws.total);
              const ip=pct(ws.inprogress,ws.total);
              const ap=pct(ws.atrisk,ws.total);
              const bp=pct(ws.blocked,ws.total);
              const np=Math.max(0,100-cp-ip-ap-bp);
              return '<div class="ws-row">'
                +'<div class="ws-name" title="'+esc(ws.name||'')+'">'+esc(ws.name||'')+'</div>'
                +'<div class="ws-bar-wrap">'
                +(ws.complete>0?'<div class="ws-seg" style="width:'+cp+'%;background:#6bc97e"></div>':'')
                +(ws.inprogress>0?'<div class="ws-seg" style="width:'+ip+'%;background:#7c6fcd"></div>':'')
                +(ws.atrisk>0?'<div class="ws-seg" style="width:'+ap+'%;background:#f0a030"></div>':'')
                +(ws.blocked>0?'<div class="ws-seg" style="width:'+bp+'%;background:#e05050"></div>':'')
                +(np>0?'<div class="ws-seg" style="width:'+np+'%;background:#2a2a3a"></div>':'')
                +'</div>'
                +'<div class="ws-right">'+ws.complete+'/'+ws.total+' <span class="ws-pct">'+cp+'%</span></div>'
                +'</div>';
            }).join('');

            // Due this week
            const dueHTML=dueThisWeek.length===0?'<div class="empty-msg">No tasks due this week</div>'
              :dueThisWeek.map(t=>{
                const dt=new Date(+t.due_date);
                const dtDay=new Date(dt);dtDay.setHours(0,0,0,0);
                const isOver=dtDay.getTime()<todayTs;
                const isToday=dtDay.getTime()===todayTs;
                const who=(t.assignees||[]).map(a=>pName(a.email||'')).filter(Boolean).slice(0,2).join(', ');
                const s=ss(t);
                const statusDot=isOver?'<span class="sdot overdue"></span>':s==='in progress'?'<span class="sdot inprog"></span>':'<span class="sdot ns"></span>';
                return '<div class="due-item">'
                  +statusDot
                  +'<div class="due-body">'
                  +'<div class="due-name">'+esc(t.name)+'</div>'
                  +'<div class="due-meta">'+esc(who)+(isOver?' <span class="tag-over">Overdue</span>':isToday?' <span class="tag-today">Today</span>':'')+'</div>'
                  +'</div>'
                  +'<div class="due-date-col">'+(isOver?'<span style="color:#e05050">':'')+fmtDate(t.due_date)+(isOver?'</span>':'')+'</div>'
                  +'</div>';
              }).join('');

            // Worked this week - show ALL team members who touched anything (no cap)
            const workedHTML=workedThisWeek.map(([e,c])=>{
              const col=avColor(pIni(e));
              return '<div class="person-row">'
                +'<div class="p-av" style="background:'+col+'">'+pIni(e)+'</div>'
                +'<div class="p-name">'+esc(pFull(e))+'</div>'
                +'<div class="p-val">'+c.workedOnTasks+'</div>'
                +'</div>';
            }).join('')||'<div class="empty-msg">No activity this week</div>';

            // Completed this week
            const completedHTML=completedByPerson.slice(0,8).map(([e,c])=>{
              const col=avColor(pIni(e));
              return '<div class="person-row">'
                +'<div class="p-av" style="background:'+col+'">'+pIni(e)+'</div>'
                +'<div class="p-name">'+esc(pFull(e))+'</div>'
                +'<div class="p-val green">'+c.completedThisWeek+'</div>'
                +'</div>';
            }).join('')||'<div class="empty-msg">Nothing completed this week</div>';

            // Completed today (matches ClickUp "Completed Today" widget)
            const completedTodayHTML=completedToday.length===0?'<div class="empty-msg">No Results</div>'
              :completedToday.map(t=>{
                const who=(t.assignees||[]).map(a=>pFull(a.email||'')).filter(Boolean).slice(0,2).join(', ');
                return '<div class="due-item">'
                  +'<span class="sdot closed-dot"></span>'
                  +'<div class="due-body">'
                  +'<div class="due-name">'+esc(t.name)+'</div>'
                  +'<div class="due-meta">'+esc(who)+'</div>'
                  +'</div>'
                  +'</div>';
              }).join('');

            // Activity - Today + Yesterday sections like ClickUp
            function renderActItems(items){
              return items.map(t=>{
                const d2=isDone(t);
                const s2=ss(t);
                const who=(t.assignees||[]).map(a=>pFull(a.email||'')).filter(Boolean).slice(0,1).join('');
                const statusLabel=d2?'<span class="badge-closed">Closed</span>':s2==='in progress'?'<span class="badge-prog">In Progress</span>':'';
                return '<div class="act-item">'
                  +(d2?'<span class="sdot closed-dot"></span>':s2==='in progress'?'<span class="sdot prog-dot"></span>':'<span class="sdot ns-dot"></span>')
                  +'<div class="act-body">'
                  +'<div class="act-name">'+esc(t.name)+'</div>'
                  +'<div class="act-meta">'+esc(who)+' '+statusLabel+'</div>'
                  +'</div>'
                  +'</div>';
              }).join('');
            }
            let actHTML='';
            if(todayActivity.length===0&&yesterdayActivity.length===0){
              actHTML='<div class="empty-msg">No recent activity</div>';
            } else {
              if(todayActivity.length>0){
                actHTML+='<div class="act-section-label">Today</div>'+renderActItems(todayActivity);
              }
              if(yesterdayActivity.length>0){
                actHTML+='<div class="act-section-label">Yesterday</div>'+renderActItems(yesterdayActivity);
              }
            }

            // Productivity table (30 days)
            const prodRows=TEAM_LIST.map(m=>{
              const c=teamMap[m.email]||{completedMonth:0,workedOnTasks:0};
              const total30=c.completedMonth+c.workedOnTasks;
              return '<tr>'
                +'<td><div class="t-person"><div class="t-av" style="background:'+avColor(m.initials)+'">'+m.initials+'</div><span>'+m.name+'</span></div></td>'
                +'<td class="tc">'+c.completedMonth+'</td>'
                +'<td class="tc">'+c.workedOnTasks+'</td>'
                +'<td class="tc bold">'+total30+'</td>'
                +'</tr>';
            }).join('');

            // Blocked
            const blkHTML=blockedTasks.length===0?'<div class="empty-msg" style="color:#6bc97e">No blocked tasks</div>'
              :blockedTasks.map(t=>{
                const who=(t.assignees||[]).map(a=>pFull(a.email||'')).filter(Boolean).slice(0,2).join(', ');
                return '<div class="blk-item">'
                  +'<div class="blk-dot"></div>'
                  +'<div><div class="blk-name">'+esc(t.name)+'</div>'
                  +(who?'<div class="blk-who">'+esc(who)+'</div>':'')
                  +'</div></div>';
              }).join('');

            // Milestones
            const msHTML=milestones.length===0?'<div class="empty-msg">No milestones</div>'
              :milestones.map(t=>{
                const d2=isDone(t);
                const dt=+t.due_date||0;
                const tDt=new Date(dt);tDt.setHours(0,0,0,0);
                const over=!d2&&dt>0&&tDt.getTime()<todayTs;
                const cls=d2?'ms-done':over?'ms-over':'';
                const badge=d2?'<span class="badge-closed">Done</span>':over?'<span class="badge-over">Overdue</span>':'<span class="badge-up">Upcoming</span>';
                return '<div class="ms-item '+cls+'">'
                  +'<span class="ms-icon">'+(d2?'✓':over?'⚠':'◇')+'</span>'
                  +'<span class="ms-name'+(d2?' done-text':'')+'">'+esc(t.name)+'</span>'
                  +(dt?'<span class="ms-date">'+fmtDate(dt)+'</span>':'')
                  +badge+'</div>';
              }).join('');

            return '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
              +'<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">\n'
              +'<title>Project F.I.N.E. Leadership Dashboard</title>\n'
              +'<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">\n'
              +'<style>'+getCSS()+'</style>\n'
              +'</head>\n<body>\n'
              +getBody({fetchedAt,daysToRetreat,completePct,total,complete,inprogress,notstarted,overdue,blocked,progW,ipW,atW,blW,nsW,donutSVG,personPieSVG,wsRowsHTML,dueHTML,workedHTML,completedHTML,completedTodayHTML,actHTML,prodRows,blkHTML,msHTML,wsCount:workstreams.length,dueCount:dueThisWeek.length,blkCount:blockedTasks.length,msCount:milestones.length,statusSegs,openByPerson})
              +'\n</body>\n</html>';
          }

          function getCSS(){
            return '*{margin:0;padding:0;box-sizing:border-box;}'
              +'body{font-family:Inter,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;font-size:13px;}'
              +'.header{background:#13131f;border-bottom:1px solid #2a2a3a;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}'
              +'.h-left{display:flex;align-items:center;gap:12px;}'
              +'.h-brand{font-size:14px;font-weight:700;color:#fff;}'
              +'.h-sep{color:#444;}'
              +'.h-title{font-size:13px;color:#888;}'
              +'.h-ts{font-size:11px;color:#555;}'
              +'.main{padding:20px 24px;max-width:1400px;margin:0 auto;}'
              +'.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}'
              +'.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}'
              +'.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:16px;}'
              +'.card{background:#13131f;border:1px solid #2a2a3a;border-radius:8px;padding:18px;}'
              +'.card-title{font-size:12px;font-weight:600;color:#aaa;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}'
              +'.card-title span{background:#2a2a3a;color:#888;font-size:10px;padding:2px 8px;border-radius:12px;text-transform:none;letter-spacing:0;}'
              +'.big-num{font-size:42px;font-weight:700;color:#fff;line-height:1;margin-bottom:4px;}'
              +'.big-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.08em;}'
              +'.countdown-num{font-size:64px;font-weight:700;color:#f0c040;line-height:1;text-align:center;}'
              +'.countdown-label{text-align:center;font-size:11px;color:#888;letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;}'
              +'.countdown-sub{text-align:center;font-size:12px;color:#bbb;margin-top:6px;font-weight:600;}'
              +'.countdown-date{text-align:center;font-size:10px;color:#555;margin-top:2px;}'
              +'.prog-bar-bg{height:8px;background:#2a2a3a;border-radius:4px;overflow:hidden;margin:12px 0 8px;display:flex;}'
              +'.prog-seg{height:100%;}'
              +'.prog-legend{display:flex;flex-wrap:wrap;gap:10px;}'
              +'.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;}'
              +'.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}'
              +'.chart-row{display:flex;align-items:center;gap:16px;}'
              +'.chart-legend{flex:1;display:flex;flex-direction:column;gap:8px;}'
              +'.cl-item{display:flex;align-items:center;justify-content:space-between;gap:8px;}'
              +'.cl-dot-name{display:flex;align-items:center;gap:8px;}'
              +'.cl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}'
              +'.cl-name{font-size:12px;color:#ccc;}'
              +'.cl-pct{font-size:12px;color:#888;font-weight:600;}'
              +'.ws-chart{display:flex;flex-direction:column;gap:7px;}'
              +'.ws-row{display:flex;align-items:center;gap:10px;}'
              +'.ws-name{font-size:11px;color:#ccc;flex:0 0 150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}'
              +'.ws-bar-wrap{flex:1;height:18px;border-radius:3px;overflow:hidden;display:flex;background:#2a2a3a;}'
              +'.ws-seg{height:100%;}'
              +'.ws-right{font-size:10px;color:#888;flex:0 0 70px;text-align:right;white-space:nowrap;}'
              +'.ws-pct{color:#f0c040;font-weight:600;margin-left:4px;}'
              +'.person-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e2e;}'
              +'.person-row:last-child{border-bottom:none;}'
              +'.p-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}'
              +'.p-name{flex:1;font-size:12px;color:#ccc;}'
              +'.p-val{font-size:18px;font-weight:700;color:#aaa;}'
              +'.p-val.green{color:#6bc97e;}'
              +'.due-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #1e1e2e;}'
              +'.due-item:last-child{border-bottom:none;}'
              +'.due-body{flex:1;}'
              +'.due-name{font-size:12px;color:#ccc;font-weight:500;margin-bottom:3px;}'
              +'.due-meta{font-size:11px;color:#666;display:flex;align-items:center;gap:6px;}'
              +'.due-date-col{font-size:11px;color:#888;white-space:nowrap;}'
              +'.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}'
              +'.sdot.overdue,.sdot.ns-dot{background:#87878f;}'
              +'.sdot.inprog,.sdot.prog-dot{background:#7c6fcd;}'
              +'.sdot.ns{background:#87878f;}'
              +'.sdot.closed-dot{background:#6bc97e;}'
              +'.tag-over{background:#4a1a1a;color:#e05050;font-size:10px;padding:1px 5px;border-radius:3px;}'
              +'.tag-today{background:#3a2a00;color:#f0a030;font-size:10px;padding:1px 5px;border-radius:3px;}'
              +'.act-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e2e;}'
              +'.act-item:last-child{border-bottom:none;}'
              +'.act-section-label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.1em;padding:8px 0 4px;margin-top:4px;}'
              +'.act-body{flex:1;}'
              +'.act-name{font-size:12px;color:#ccc;font-weight:500;margin-bottom:3px;line-height:1.4;}'
              +'.act-meta{font-size:11px;color:#666;display:flex;align-items:center;gap:6px;}'
              +'.badge-closed{background:#1a3a1a;color:#6bc97e;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;}'
              +'.badge-prog{background:#1e1a3a;color:#7c6fcd;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;}'
              +'.badge-over{background:#3a1a1a;color:#e05050;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;}'
              +'.badge-up{background:#2a2a1a;color:#f0c040;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;}'
              +'.blk-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1e1e2e;}'
              +'.blk-item:last-child{border-bottom:none;}'
              +'.blk-dot{width:8px;height:8px;border-radius:50%;background:#e05050;flex-shrink:0;margin-top:3px;}'
              +'.blk-name{font-size:12px;color:#ccc;font-weight:500;}'
              +'.blk-who{font-size:11px;color:#666;}'
              +'.ms-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;margin-bottom:6px;background:#1e1e2e;}'
              +'.ms-item.ms-done{background:#1a2a1a;}'
              +'.ms-item.ms-over{background:#2a1a1a;}'
              +'.ms-icon{font-size:12px;flex-shrink:0;color:#888;}'
              +'.ms-name{flex:1;font-size:12px;color:#ccc;font-weight:500;}'
              +'.ms-name.done-text{color:#555;text-decoration:line-through;}'
              +'.ms-date{font-size:11px;color:#666;flex-shrink:0;}'
              +'.team-table{width:100%;border-collapse:collapse;}'
              +'.team-table th{font-size:11px;color:#666;font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid #2a2a3a;text-transform:uppercase;letter-spacing:0.05em;}'
              +'.team-table th.tc{text-align:center;}'
              +'.team-table td{padding:10px;border-bottom:1px solid #1e1e2e;}'
              +'.team-table tr:last-child td{border-bottom:none;}'
              +'.team-table tr:hover td{background:#1e1e2e;}'
              +'.t-person{display:flex;align-items:center;gap:10px;}'
              +'.t-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}'
              +'.tc{text-align:center;color:#aaa;}'
              +'.bold{font-weight:700;color:#fff;}'
              +'.pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;}'
              +'.empty-msg{color:#555;font-size:12px;padding:16px 0;text-align:center;}'
              +'.mb16{margin-bottom:16px;}';
          }

          function getBody(d){
            const {fetchedAt,daysToRetreat,completePct,total,complete,inprogress,notstarted,overdue,blocked,progW,ipW,atW,blW,nsW,donutSVG,personPieSVG,wsRowsHTML,dueHTML,workedHTML,completedHTML,completedTodayHTML,actHTML,prodRows,blkHTML,msHTML,wsCount,dueCount,blkCount,msCount,statusSegs,openByPerson}=d;

            const pieLegend=openByPerson.slice(0,8).map(([e,c])=>{
              const col=avColor(pIni(e));
              return '<div class="cl-item">'
                +'<div class="cl-dot-name"><div class="cl-dot" style="background:'+col+'"></div>'
                +'<div class="cl-name">'+esc(pFull(e))+'</div></div>'
                +'<div class="cl-pct">'+c.open+'</div>'
                +'</div>';
            }).join('');

            const statusLegend=statusSegs.map(s=>'<div class="legend-item"><div class="ld" style="background:'+s.color+'"></div>'+s.label+' '+s.value+'</div>').join('');

            return '<div class="header">'
              +'<div class="h-left"><div class="h-brand">Project F.I.N.E.</div>'
              +'<span class="h-sep">|</span>'
              +'<div class="h-title">Leadership Dashboard</div></div>'
              +'<div class="h-ts">Data as of '+fetchedAt+'</div>'
              +'</div>\n'
              +'<div class="main">\n'

              // Row 1: 3 stat cards + countdown
              +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 180px;gap:16px;margin-bottom:16px;">'
              +'<div class="card"><div class="big-num">'+total-complete+'</div><div class="big-label">Open Tasks</div></div>'
              +'<div class="card"><div class="big-num" style="color:#e05050">'+overdue+'</div><div class="big-label">Overdue Tasks</div></div>'
              +'<div class="card"><div class="big-num">'+total+'</div><div class="big-label">Total Tasks</div></div>'
              +'<div class="card" style="background:linear-gradient(135deg,#1a1a2e,#13131f);">'
              +'<div class="countdown-num">'+daysToRetreat+'</div>'
              +'<div class="countdown-label">days to retreat</div>'
              +'<div class="countdown-sub">Teacher Training</div>'
              +'<div class="countdown-date">July 19&#8211;22, 2026</div>'
              +'</div>'
              +'</div>\n'

              // Row 2: progress bar full width
              +'<div class="card mb16">'
              +'<div class="card-title">Overall Progress Towards Completion</div>'
              +'<div class="prog-bar-bg">'
              +(progW>0?'<div class="prog-seg" style="width:'+progW+'%;background:#6bc97e"></div>':'')
              +(ipW>0?'<div class="prog-seg" style="width:'+ipW+'%;background:#7c6fcd"></div>':'')
              +(atW>0?'<div class="prog-seg" style="width:'+atW+'%;background:#f0a030"></div>':'')
              +(blW>0?'<div class="prog-seg" style="width:'+blW+'%;background:#e05050"></div>':'')
              +(nsW>0?'<div class="prog-seg" style="width:'+nsW+'%;background:#2a2a3a"></div>':'')
              +'</div>'
              +'<div style="display:flex;justify-content:space-between;margin-bottom:8px;">'
              +'<div style="font-size:12px;color:#aaa;">0</div>'
              +'<div style="font-size:12px;font-weight:600;color:#f0c040;">'+completePct+'% Complete ('+complete+'/'+total+' tasks)</div>'
              +'<div style="font-size:12px;color:#aaa;">100</div>'
              +'</div>'
              +'<div class="prog-legend">'+statusLegend+'</div>'
              +'</div>\n'

              // Row 3: workload donut + open by assignee pie
              +'<div class="row2">'
              +'<div class="card">'
              +'<div class="card-title">Workload by Status</div>'
              +'<div class="chart-row">'
              +donutSVG
              +'<div class="chart-legend">'
              +statusSegs.map(s=>'<div class="cl-item"><div class="cl-dot-name"><div class="cl-dot" style="background:'+s.color+'"></div><div class="cl-name">'+s.label+'</div></div><div class="cl-pct">'+s.value+'</div></div>').join('')
              +'</div></div></div>'
              +'<div class="card">'
              +'<div class="card-title">Open Tasks by Assignee</div>'
              +'<div class="chart-row">'
              +personPieSVG
              +'<div class="pie-legend">'+pieLegend+'</div>'
              +'</div></div>'
              +'</div>\n'

              // Row 4: workstream progress full width
              +'<div class="card mb16">'
              +'<div class="card-title">Workstream Progress <span>'+wsCount+' active</span></div>'
              +'<div class="ws-chart">'+wsRowsHTML+'</div>'
              +'<div class="prog-legend" style="margin-top:12px;">'
              +'<div class="legend-item"><div class="ld" style="background:#6bc97e"></div>Closed</div>'
              +'<div class="legend-item"><div class="ld" style="background:#7c6fcd"></div>In Progress</div>'
              +'<div class="legend-item"><div class="ld" style="background:#f0a030"></div>At Risk</div>'
              +'<div class="legend-item"><div class="ld" style="background:#e05050"></div>Blocked</div>'
              +'<div class="legend-item"><div class="ld" style="background:#2a2a3a"></div>Not Started</div>'
              +'</div></div>\n'

              // Row 5: due this week full width
              +'<div class="card mb16">'
              +'<div class="card-title">Tasks Due This Week <span>'+dueCount+' tasks</span></div>'
              +dueHTML
              +'</div>\n'

              // Row 6: worked / completed / activity
              +'<div class="row3">'
              +'<div class="card"><div class="card-title">Worked On This Week</div>'+workedHTML+'</div>'
              +'<div class="card"><div class="card-title">Completed Today</div>'+completedTodayHTML+'</div>'
              +'<div class="card"><div class="card-title">Latest Activity</div>'+actHTML+'</div>'
              +'</div>\n'

              // Row 7: blocked + milestones
              +'<div class="row2">'
              +'<div class="card"><div class="card-title">Blocked Tasks <span>'+blkCount+'</span></div>'+blkHTML+'</div>'
              +'<div class="card"><div class="card-title">Milestones &amp; Gates <span>'+msCount+'</span></div>'+msHTML+'</div>'
              +'</div>\n'

              // Row 8: productivity table
              +'<div class="card mb16">'
              +'<div class="card-title">Productivity &#8212; Last 30 Days</div>'
              +'<table class="team-table"><thead><tr>'
              +'<th>Team Member</th><th class="tc">Tasks Completed</th><th class="tc">Worked On</th><th class="tc">Total Points</th>'
              +'</tr></thead><tbody>'+prodRows+'</tbody></table>'
              +'</div>\n'

              +'</div>';
          }

          main().catch(e=>{console.error('FAILED:',e.message);process.exit(1);});
          JSEOF

      - name: Run build script
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          SPACE_ID: '901313746539'
        run: node build.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
