              + '.top-row{display:grid;grid-template-columns:1fr auto;gap:14px;margin-bottom:14px;align-items:stretch;}\n'
              + '.top-left{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}\n'
